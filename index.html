<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="Style/Style.css">
</head>

<body>
    <div class="container navbar mb-5">
        <img src="Images/big_5_logo.png" alt="Red car">
        <a href = "https://www.bigfive.dirban"><button>Home</button></a>
    </div>

    <div class="container">
        <div class="group">
            <div class="banner">
                <p>Meet <br> <span>best of durban</span> <br>Autobody repairer</p>
                <img src="Images/IMG_3770.JPG">
            </div>
            <form action="https://api.web3forms.com/submit" method="POST">
                <h1>Visitors Register</h1>

                <input type="hidden" name="access_key" value="3622e100-8ad1-4fe1-a7fe-0353246bc6b7">
                <div class="form-floating mb-4">
                    <input type="text" name="First Name" placeholder="John" class="form-control form-control-lg" required>
                    <label>First Name</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" name="Last Name" placeholder="Smith" class="form-control form-control-lg" required>
                    <label>Last Name</label>
                </div>

                <div class="input-group mb-4">
                    <div class="input-group-text">+27</div>
                    <input type="text" name="Contact" class="form-control form-control-lg" required>
                </div>

                <div class="form-floating mb-4">
                    <input type="text" name="Email" placeholder="Sam@bbigfive.durban" class="form-control form-control-lg" required>
                    <label>Email</label>
                </div>
                
                <div class="form-floating mb-4">
                    <input type="datetime-local" name="Date"  class="form-control form-control-lg" required>
                    <label>Date</label>
                </div>
                
                <Select name="Reason for Visit" class="form-select form-select-lg mb-4" required>
                    < option value="" selected></option>
                    <option value="Visit">Visit</option>
                    <option value="Quotation">Quotation</option>
                    <option value="Constructot">Constractor</option>
                    <option value="Assessor">Assessor</option>
                    <option value="BooIn">Book in for repaires</option>
                    <option value="Tow">Tow company</option>
                    <option value="Meeting">Meeting</option>
                    <option value="Enquiries">Enquiries</option>
                    <option value="Delivery">Delivery</option>
                    <option value="Appointment">Appointment</option>
                    <option value="Interview">Interview</option>
                    <option value="Other">Other</option>
                </Select>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Submit</button>
            </form>
        </div>
        
    </div>
</body>

</html>
